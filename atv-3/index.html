<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade de Layouts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="container layout-1">
        <header class="header-slot"></header>
        <div class="flex-row">
            <div class="col-text">
                <div class="slot title"></div>
                <div class="slot text"></div>
                <div class="slot button"></div>
            </div>
            <div class="col-img">
                <div class="slot img-placeholder"></div>
            </div>
        </div>
    </section>

    <section class="container layout-2">
        <div class="flex-column-center">
            <div class="slot title-large"></div>
            <div class="slot text-medium"></div>
            <div class="flex-row gap-10">
                <div class="slot input-field"></div>
                <div class="slot button-green"></div>
            </div>
        </div>
    </section>

    <section class="container layout-3">
        <div class="news-item">
            <div class="slot news-thumb"></div>
            <div class="slot news-content"></div>
        </div>
        <div class="news-item">
            <div class="slot news-thumb"></div>
            <div class="slot news-content"></div>
        </div>
    </section>

    <section class="container layout-4">
        <div class="flex-row">
            <div class="col-text">
                <div class="slot title-mega"></div>
                <div class="slot text-block"></div>
                <div class="flex-row gap-10">
                    <div class="slot button-black"></div>
                    <div class="slot button-outline"></div>
                </div>
            </div>
            <div class="col-graphics">
                <div class="slot abstract-art"></div>
            </div>
        </div>
    </section>

    <section class="container layout-5">
        <div class="carousel-row">
            <div class="slot movie-card">1</div>
            <div class="slot movie-card">2</div>
            <div class="slot movie-card">3</div>
        </div>
        <div class="grid-benefits">
            <div class="slot benefit-box"></div>
            <div class="slot benefit-box"></div>
            <div class="slot benefit-box"></div>
            <div class="slot benefit-box"></div>
        </div>
    </section>

    <section class="container layout-6">
        <div class="portfolio-grid">
            <div class="slot shot"></div>
            <div class="slot shot"></div>
            <div class="slot shot"></div>
            <div class="slot shot"></div>
            <div class="slot shot"></div>
            <div class="slot shot"></div>
        </div>
    </section>

</body>
</html>
